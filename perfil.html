<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — SocioJoven</title>
  <link rel="stylesheet" href="./CSS/practica.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">🌟 SocioJoven</a>
      <nav>
        <ul>
          <li><a href="index.html">Inicio</a></li>
          <li><a href="subir.html">Subir Programa</a></li>
          <li><a href="perfil.html">Mi Perfil</a></li>
          <li>
            <button class="btn-cerrar-sesion" id="btn-cerrar-sesion">
              Cerrar Sesión
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- Sección de información del usuario -->
    <section class="perfil-header">
      <div class="perfil-avatar" id="perfil-avatar">
        <!-- Las iniciales del usuario irán aquí -->
      </div>
      <div class="perfil-info">
        <h1 id="perfil-nombre">Cargando...</h1>
        <p id="perfil-email">Cargando...</p>
        <span id="perfil-contador-programas">0 programas publicados</span>
      </div>
    </section>

    <!-- Feed de programas del usuario -->
    <section class="feed">
      <h2>Mis Programas</h2>
      <div class="grid-programas" id="grid-mis-programas">
        <!-- Los programas del usuario se renderizan aquí -->
      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 Sociedad de Jóvenes. Hecho con ❤️ por la comunidad.</p>
  </footer>

  <script src="js/perfil.js"></script>

</body>
</html>
